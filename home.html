<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Byte Sized Tech</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Byte Sized Tech: A beginners guide to technology</h1>
        <nav>
            <a href="https://open.spotify.com">Spotify</a>
            <a href="https://podcasts.google.com">Google Podcasts</a>
            <a href="https://www.youtube.com">YouTube</a>
        </nav>
    </header>
    <main>
        <div class="container">
            <aside id="search-section">
                <input type="text" id="search-input" placeholder="Search for an episode...">
                <div id="search-results"></div>
            </aside>
            <div class="content">
                <section id="latest-episode">
                    <h2>Latest Episode</h2>
                    <!-- Latest episode will be populated here by JavaScript -->
                </section>
                <section id="previous-episodes">
                    <h2>Previous Episodes</h2>
                    <!-- Previous episodes will be populated here by JavaScript -->
                </section>
                <button id="show-more-btn">Show More Episodes</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
